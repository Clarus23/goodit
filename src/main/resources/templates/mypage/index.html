<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>마이페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0">마이페이지</h5>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
                    </form>
                </div>
                <div class="card-body p-4">
                    <table class="table table-borderless">
                        <tr>
                            <th class="text-muted" style="width: 30%">아이디</th>
                            <td th:text="${member.username}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted">이메일</th>
                            <td th:text="${member.email}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted">가입일</th>
                            <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
